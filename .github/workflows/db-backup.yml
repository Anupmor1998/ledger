name: Daily DB Backup To Google Drive

on:
  schedule:
    # 11:30 PM IST = 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install backup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg lsb-release rclone
          DIST_CODENAME="$(lsb_release -cs)"
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt ${DIST_CODENAME}-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Verify pg_dump version
        run: |
          which pg_dump || true
          pg_dump --version || true
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Prepare service account credentials
        run: |
          echo "${GDRIVE_SERVICE_ACCOUNT_JSON}" > /tmp/gdrive-service-account.json
          chmod 600 /tmp/gdrive-service-account.json
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}

      - name: Run database backup
        run: |
          chmod +x scripts/backup-to-gdrive.sh
          scripts/backup-to-gdrive.sh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_BACKUP }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_FILE: /tmp/gdrive-service-account.json
          GDRIVE_SUBDIR: ledger-server
          RETENTION_DAYS: "30"
          DB_NAME: ledger
          PG_DUMP_BIN: /usr/lib/postgresql/17/bin/pg_dump
